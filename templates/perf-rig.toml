# perf-rig.toml v1 — declarative load spec for the host-side perf hub.
#
# `just perf` substitutes ${JOLO_TAILNET_HOST} and ${PORT} via envsubst
# before POSTing, so the resolved URL never lands in a committed file.
# Set JOLO_TAILNET_HOST in your shell (or an env file); $PORT is exported
# by the devcontainer. Override the hub with PERF_HUB if needed.
#
# The hub's k6 worker runs on the host and reaches this project over the
# tailnet, NOT via localhost. Keep the env-var form below as-is.

schema_version = 1

[project]
name = "{{PROJECT_NAME}}"
language = "{{PROJECT_LANGUAGE}}"

[target]
mode = "external_url"
url = "http://${JOLO_TAILNET_HOST}:${PORT}"

# One scenario per route. Do not multiplex routes inside one scenario —
# it breaks per-route arrival-rate tracking.
[[routes]]
route_id = "landing"
path = "/"
method = "GET"
rate_per_sec = 2
duration = "20s"
warmup = "3s"
preallocated_vus = 5
max_vus = 15

[validity]
# Gates that decide whether the run is trustworthy at all.
# Regression detection only sees runs that pass these.
max_dropped_iterations = 5
max_failure_rate = 0.05

[regression.landing]
# Dev-container default. Async frameworks with hot-reload have p99 tails
# in the seconds, not the hundreds of millis. Tighten once you know your
# actual baseline, or move perf runs to a hub-bare testbed.
p99_ms = 3000
