# perf-rig.toml v1 — declarative load spec for the host-side perf hub.
#
# `just perf` substitutes ${DEV_HOST} and ${PORT} via envsubst before
# POSTing, so the resolved URL never lands in a committed file.
# Set PERF_HOST on the host (.zshrc), e.g.
#     export PERF_HOST=http://<your-host>:8888
# It flows into devcontainers via the mounted .zshrc. The recipe uses
# DEV_HOST (set by jolo at container start, or derived from PERF_HOST)
# as the hostname the hub uses to reach back to this project.
# $PORT is exported by the devcontainer.
#
# The hub's k6 worker runs on the host and cannot reach this project
# via localhost; it needs an externally-reachable URL. Keep the
# env-var form below as-is.

schema_version = 1

[project]
name = "{{PROJECT_NAME}}"
language = "{{PROJECT_LANGUAGE}}"

[target]
mode = "external_url"
url = "http://${DEV_HOST}:${PORT}"

# One scenario per route. Do not multiplex routes inside one scenario —
# it breaks per-route arrival-rate tracking.
[[routes]]
route_id = "landing"
path = "/"
method = "GET"
rate_per_sec = 2
duration = "20s"
warmup = "3s"
preallocated_vus = 5
max_vus = 15

[validity]
# Gates that decide whether the run is trustworthy at all.
# Regression detection only sees runs that pass these.
max_dropped_iterations = 5
max_failure_rate = 0.05

[regression.landing]
# Dev-container default. Async frameworks with hot-reload have p99 tails
# in the seconds, not the hundreds of millis. Tighten once you know your
# actual baseline, or move perf runs to a hub-bare testbed.
p99_ms = 3000
