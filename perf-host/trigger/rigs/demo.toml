# perf-rig.toml v1 — bundled demo rig.
# Fires k6 against the in-compose go-httpbin service.

schema_version = 1

[project]
name = "demo"
language = "go"

[target]
mode = "external_url"
url = "http://demo:8080"

[[routes]]
route_id = "get_root"
path = "/get"
method = "GET"
rate_per_sec = 30
duration = "20s"
warmup = "3s"
preallocated_vus = 30
max_vus = 60

[[routes]]
route_id = "delay_100ms"
path = "/delay/0.1"
method = "GET"
rate_per_sec = 10
duration = "20s"
warmup = "3s"
preallocated_vus = 20
max_vus = 40

[[routes]]
route_id = "status_200"
path = "/status/200"
method = "GET"
rate_per_sec = 50
duration = "20s"
warmup = "3s"
preallocated_vus = 30
max_vus = 60

[validity]
max_dropped_iterations = 5
max_failure_rate = 0.01

[regression.get_root]
p99_ms = 200

[regression.delay_100ms]
p99_ms = 400

[regression.status_200]
p99_ms = 100
